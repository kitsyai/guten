version: 2
project_name: guten

# The CLI is a submodule (cli/). We build it here and publish to the prefixed
# cli/vX.Y.Z tag via gh (see scripts/release-cli.sh) — OSS goreleaser has no
# monorepo/tag_prefix support, so version comes from GORELEASER_CURRENT_TAG.
builds:
  - id: guten
    dir: cli
    main: ./cmd/guten
    binary: guten
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: guten
    name_template: "guten_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"
