name: release-cli

# Builds prebuilt guten CLI binaries (win/mac/linux, amd64/arm64) and publishes
# them to the GitHub Release for the pushed cli/vX.Y.Z tag — no Go toolchain
# needed by users. NOTE: a tag only triggers this if the workflow already exists
# at the tagged commit, so tag AFTER this file is on main.
on:
  push:
    tags: ["cli/v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          install-only: true
      - name: Build + publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/release-cli.sh "${GITHUB_REF_NAME#cli/}"
